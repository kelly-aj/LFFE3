<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>LFF Task - Version 1</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<link rel="stylesheet" href="jspsych/jspsych.css" />
<script src="jspsych/jspsych.js"></script>
<script src="jspsych/plugin-preload.js"></script>
<script src="jspsych/plugin-html-keyboard-response.js"></script>
<script src="jspsych/plugin-html-button-response.js"></script>

<style>
body { background:#fafafa; font-family: Arial, sans-serif; color:#111; }
.centered { max-width:900px; margin:0 auto; padding:24px; line-height:1.45; }
.question-title { font-size:22px; font-weight:600; margin-bottom:16px; }
.image-choice-container { display:flex; justify-content:center; gap:40px; flex-wrap:wrap; }
.choice-img { max-width:360px; max-height:320px; border:2px solid #ddd; border-radius:6px; }
.vertical-btn {
  display:block;
  width:700px;
  max-width:90%;
  text-align:left;
  margin:10px auto;
  padding:12px;
  white-space:normal;
}
</style>
</head>

<body>
<div id="jspsych-target"></div>

<script>

/**************** CONFIG ****************/
const VERSION = "v1";
const ROUND2_CORRECT_RULE = "same";
const BREAK_SECONDS = 120;
const QUALTRICS_RETURN_URL = "https://merceruniversity.co1.qualtrics.com/jfe/form/SV_eEG4o0S1x2n2DFI";

/**************** INIT ****************/
const jsPsych = initJsPsych({ display_element:'jspsych-target' });
jsPsych.data.addProperties({ version: VERSION });

/**************** HELPERS ****************/
function imgChoice(src, alt){
  return `<img class="choice-img" src="${src}" alt="${alt}">`;
}

/**************** DATA ****************/
const round1Questions = [
 {pair:1,prompt:"Question #1. Which of the following characters in an ancient script represents an animal?"},
 {pair:2,prompt:"Question #2. Which of the following characters in an ancient script represents a person?"},
 {pair:3,prompt:"Question #3. Which of the following characters in an ancient script represents a bird?"},
 {pair:4,prompt:"Question #4. Which of the following characters in an ancient script represents a rodent?"}
];

const imagePairs = [
 {A:"img/Pair 1 Image A.png",B:"img/Pair 1 Image B.png"},
 {A:"img/Pair 2 Image A.png",B:"img/Pair 2 Image B.png"},
 {A:"img/Pair 3 Image A.png",B:"img/Pair 3 Image B.png"},
 {A:"img/Pair 4 Image A.png",B:"img/Pair 4 Image B.png"}
];

const round1Choices=[null,null,null,null];

/**************** INTRO ****************/
const intro1={
 type:jsPsychHtmlKeyboardResponse,
 stimulus:`
 <div class="centered">
 <p>Welcome! Today you will answer some language questions about a researcher-manufactured ancient script.</p>
 <p>Whether you get the answers right or wrong in Round 1, try to learn.</p>
 <p><strong>Press space to continue.</strong></p>
 </div>`,
 choices:[' ']
};

const intro2={
 type:jsPsychHtmlKeyboardResponse,
 stimulus:`
 <div class="centered">
 <p>People often assume they naturally learn from their mistakes, but research shows this process is more difficult.</p>
 <p>Memory for mistakes can be unreliable.</p>
 <p><strong>Press space to continue.</strong></p>
 </div>`,
 choices:[' '],
 on_finish:function(data){
   data.reading_time=data.rt;
 }
};

/**************** COMPREHENSION CHECK ****************/
let compOptions=[];
const comprehensionCheck={
 type:jsPsychHtmlButtonResponse,
 stimulus:`
 <div class="centered">
 <div class="question-title">
 According to the message you just read, what is the main point about learning from mistakes?
 </div></div>`,
 on_start:function(){
  compOptions=jsPsych.randomization.shuffle([
   {text:"People usually remember failures accurately without much effort.",value:"A"},
   {text:"Learning from mistakes requires deliberate attention because memory of what happened can be unreliable.",value:"B"},
   {text:"Most mistakes are caused by external factors.",value:"C"},
   {text:"People naturally avoid repeating errors.",value:"D"}
  ]);
  this.choices=compOptions.map(o=>o.text);
 },
 button_html:`<button class="vertical-btn">%choice%</button>`,
 on_finish:function(data){
  const sel=compOptions[data.response];
  data.selected_option=sel.value;
  data.correct=(sel.value==="B")?1:0;
 }
};

/**************** ROUND 1 ****************/
function makeRound1Trial(i){
 const pair=imagePairs[i];
 return{
  type:jsPsychHtmlButtonResponse,
  stimulus:`<div class="centered"><div class="question-title">${round1Questions[i].prompt}</div></div>`,
  choices:[imgChoice(pair.A,"A"),imgChoice(pair.B,"B")],
  on_finish:function(data){
   const c=(data.response===0)?"A":"B";
   data.choice_label=c;
   round1Choices[i]=c;
  }
 };
}

/**************** FEEDBACK ****************/
const incorrectFeedback={
 type:jsPsychHtmlKeyboardResponse,
 stimulus:`<div class="centered"><h2>YOU ANSWERED THIS QUESTION INCORRECT!</h2></div>`,
 choices:[' ']
};

/**************** ROUND 2 ****************/
function makeRound2Trial(i){
 const pair=imagePairs[i];
 return{
  type:jsPsychHtmlButtonResponse,
  stimulus:`<div class="centered"><div class="question-title">Round 2 Question ${i+1}</div></div>`,
  choices:[imgChoice(pair.A,"A"),imgChoice(pair.B,"B")],
  on_finish:function(data){
   const c=(data.response===0)?"A":"B";
   data.correct=(c===round1Choices[i])?1:0;
  }
 };
}

/**************** FINAL ****************/
const finalScreen={
 type:jsPsychHtmlButtonResponse,
 stimulus:`<div class="centered"><p>Thank you!</p></div>`,
 choices:['Continue'],
 on_finish:function(){ window.location.href=QUALTRICS_RETURN_URL; }
};

/**************** TIMELINE ****************/
const timeline=[];
timeline.push(intro1,intro2,comprehensionCheck);

for(let i=0;i<4;i++){
 timeline.push(makeRound1Trial(i));
 timeline.push(incorrectFeedback);
}

for(let i=0;i<4;i++){
 timeline.push(makeRound2Trial(i));
}

timeline.push(finalScreen);

jsPsych.run(timeline);

</script>
</body>
</html>
