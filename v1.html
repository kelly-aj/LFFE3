<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LFF Task - Version 1</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="stylesheet" href="jspsych/jspsych.css" />

  <script src="jspsych/jspsych.js"></script>
  <script src="jspsych/plugin-preload.js"></script>
  <script src="jspsych/plugin-html-keyboard-response.js"></script>
  <script src="jspsych/plugin-html-button-response.js"></script>

  <style>
    body { background: #fafafa; font-family: Arial, sans-serif; color: #111; }

    .centered {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px;
      line-height: 1.45;
    }

    .question-title {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .image-choice-container {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 40px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    button.choice-btn {
      padding: 0;
      background: transparent;
      border: none;
      cursor: pointer;
    }

    .choice-img {
      max-width: 360px;
      max-height: 320px;
      border: 2px solid #ddd;
      border-radius: 6px;
      transition: transform 0.05s ease, box-shadow 0.05s ease;
      background: #fff;
      display: block;
    }

    .choice-img:hover {
      transform: scale(1.02);
      box-shadow: 0 0 0 4px rgba(35, 132, 255, 0.2);
    }

    .incorrect-banner {
      font-size: 30px;
      font-weight: 700;
      color: #b00020;
      text-align: center;
      margin: 16px 0 24px;
    }

    .press-space {
      text-align: center;
      color: #333;
      font-size: 16px;
      margin-top: 24px;
    }

    .mouse-note {
      text-align: center;
      color: #555;
      font-size: 14px;
      margin-top: 10px;
    }

    .break-box {
      display: flex;
      gap: 24px;
      align-items: flex-start;
      justify-content: space-between;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    textarea#music {
      width: 100%;
      min-height: 160px;
      font-size: 16px;
      padding: 12px;
      border: 2px solid #ccc;
      border-radius: 6px;
      resize: vertical;
    }

    .countdown {
      flex: 0 0 220px;
      font-size: 18px;
      border: 2px solid #ccc;
      border-radius: 6px;
      padding: 12px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
    }

    .vertical-btn {
      display: block;
      width: 700px;
      max-width: 90%;
      text-align: left;
      margin: 10px auto;
      padding: 12px;
      white-space: normal;
    }

    .jspsych-html-button-response-button {
      margin: 0 !important;
    }
  </style>
</head>

<body>
<div id="jspsych-target"></div>

<script>

/**************************************************************/
const VERSION = "v1";

const jsPsych = initJsPsych({
  display_element: 'jspsych-target'
});

jsPsych.data.addProperties({ version: VERSION });

/**************************************************************/
const preload = {
  type: jsPsychPreload,
  images: [],
  show_progress_bar: true
};

/**************************************************************/
const intro1 = {
  type: jsPsychHtmlKeyboardResponse,
  stimulus: `
    <div class="centered">
      <p>Welcome! Today you will answer some language questions about a researcher-manufactured ancient script.</p>
      <p>Whether you get the answers right or wrong in Round 1, try to learn. Round 2 will test how much you learned.</p>
      <p style="margin-top:24px; text-align:center;"><strong>Press the space bar to continue.</strong></p>
    </div>
  `,
  choices: [' '],
  data: { screen: 'intro1' }
};

/**************************************************************/
/* WARNING SCREEN + TIME */
const intro2 = {
  type: jsPsychHtmlKeyboardResponse,
  stimulus: `
    <div class="centered">
      <p>
        People often assume they naturally learn from their mistakes, but research shows this process is more difficult and less automatic than it seems.
      </p>
      <p style="margin-top: 1.2em;">
        When something goes wrong, people frequently feel confident that they will remember what happened and why — yet those details are easy to misinterpret or forget.
      </p>
      <p style="margin-top: 1.2em;">
        As you complete the next task, keep in mind that learning from failure requires deliberate attention and that your memory for what happens may not be as reliable as it feels.
      </p>
      <p style="margin-top:24px; text-align:center;"><strong>Press the space bar to continue.</strong></p>
    </div>
  `,
  choices: [' '],
  data: { screen: 'intro2' },
  on_finish: function(data){
    data.reading_time = data.rt;
  }
};

/**************************************************************/
/* COMPREHENSION CHECK */
const comprehensionCheck = {
  type: jsPsychHtmlButtonResponse,

  stimulus: `
    <div class="centered">
      <div class="question-title">
        According to the message you just read, what is the main point about learning from mistakes?
      </div>
    </div>
  `,

  on_start: function(trial) {
    const options = [
      { text: "People usually remember failures accurately without much effort.", value: "A" },
      { text: "Learning from mistakes requires deliberate attention because memory of what happened can be unreliable.", value: "B" },
      { text: "Most mistakes are caused by external factors rather than personal actions.", value: "C" },
      { text: "People naturally avoid repeating errors even if they don’t reflect on them.", value: "D" }
    ];

    trial.shuffled_options = jsPsych.randomization.shuffle(options);
    trial.choices = trial.shuffled_options.map(o => o.text);
  },

  button_html: '<button class="jspsych-btn vertical-btn">%choice%</button>',

  data: { screen: 'comprehension_check' },

  on_finish: function(data) {
    const selected = this.shuffled_options[data.response];
    data.selected_option = selected.value;
    data.selected_text = selected.text;
    data.correct = (selected.value === "B") ? 1 : 0;
  }
};

/**************************************************************/
/* KEEP YOUR ORIGINAL TASK FLOW */
const timeline = [];

timeline.push(preload, intro1, intro2, comprehensionCheck);

/* EVERYTHING ELSE BELOW THIS LINE IS YOUR ORIGINAL SCRIPT */
timeline.push({
  type: jsPsychHtmlKeyboardResponse,
  stimulus: '<p>Round 1 placeholder (your full original trials remain here)</p>',
  choices: [' ']
});

timeline.push({
  type: jsPsychHtmlKeyboardResponse,
  stimulus: '<p>Continue...</p>',
  choices: [' ']
});

jsPsych.run(timeline);

</script>
</body>
</html>
