<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LFF Task - Version 1</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="jspsych/jspsych.css" />
  <script src="jspsych/jspsych.js"></script>
  <script src="jspsych/plugin-preload.js"></script>
  <script src="jspsych/plugin-html-keyboard-response.js"></script>
  <script src="jspsych/plugin-html-button-response.js"></script>

  <style>
    body { background: #fafafa; font-family: Arial, sans-serif; color: #111; }
    .centered { max-width: 900px; margin: 0 auto; padding: 24px; line-height: 1.45; }
    .question-title { font-size: 22px; font-weight: 600; margin-bottom: 16px; }
    .image-choice-container { display: flex; justify-content: center; align-items: flex-start; gap: 40px; margin-top: 18px; flex-wrap: wrap; }
    button.choice-btn { padding: 0; background: transparent; border: none; cursor: pointer; }
    .choice-img { max-width: 360px; max-height: 320px; border: 2px solid #ddd; border-radius: 6px; transition: transform 0.05s ease, box-shadow 0.05s ease; background: #fff; display: block; }
    .choice-img:hover { transform: scale(1.02); box-shadow: 0 0 0 4px rgba(35, 132, 255, 0.2); }
    .incorrect-banner { font-size: 30px; font-weight: 700; color: #b00020; text-align: center; margin: 16px 0 24px; }
    .press-space { text-align: center; color: #333; font-size: 16px; margin-top: 24px; }
    .mouse-note { text-align: center; color: #555; font-size: 14px; margin-top: 10px; }
    .break-box { display: flex; gap: 24px; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; margin-top: 10px; }
    textarea#music { width: 100%; min-height: 160px; font-size: 16px; padding: 12px; border: 2px solid #ccc; border-radius: 6px; resize: vertical; }
    .countdown { flex: 0 0 220px; font-size: 18px; border: 2px solid #ccc; border-radius: 6px; padding: 12px; height: 56px; display: flex; align-items: center; justify-content: center; background: #fff; }
    .vertical-btn { display: block; width: 700px; max-width: 90%; text-align: left; margin: 10px auto; padding: 12px; white-space: normal; }
    .jspsych-html-button-response-button { margin: 0 !important; }
  </style>
</head>
<body>
<div id="jspsych-target"></div>

<script>
/**************************************************************/
/* CONFIGURATION */
const VERSION = "v1";
const ROUND2_CORRECT_RULE = "same";
const BREAK_SECONDS = 120;
const QUALTRICS_RETURN_URL = "https://merceruniversity.co1.qualtrics.com/jfe/form/SV_eEG4o0S1x2n2DFI";

/**************************************************************/
/* INIT */
const jsPsych = initJsPsych({ display_element: 'jspsych-target' });
jsPsych.data.addProperties({ version: VERSION });

/**************************************************************/
/* HELPERS */
function buildSummaryPayload() {
  const all = jsPsych.data.get();
  const r1 = all.filter({ round: 1 });
  const r2 = all.filter({ round: 2 });
  const r1_choices = r1.select('choice_label').values.join(',');
  const r2_choices = r2.select('choice_label').values.join(',');
  const r2_correct_arr = r2.select('correct').values.map(x => Number(x || 0));
  const r2_correct = r2_correct_arr.join(',');
  const r2_total = r2_correct_arr.reduce((a,b)=>a+b,0);
  const rt_r1 = r1.select('rt').values.join(',');
  const rt_r2 = r2.select('rt').values.join(',');
  const breakRows = all.filter({ screen: 'break' }).values();
  const music = (breakRows.length && breakRows[0].favorite_music) ? breakRows[0].favorite_music : "";
  const music_short = music.length > 150 ? music.slice(0,150) : music;
  return { r1_choices, r2_choices, r2_correct, r2_total: String(r2_total), rt_r1, rt_r2, music_short };
}

function sendDataToQualtrics() {
  const payload = buildSummaryPayload();
  const params = new URLSearchParams(window.location.search);
  const PROLIFIC_PID = params.get('PROLIFIC_PID') || '';
  const STUDY_ID = params.get('STUDY_ID') || '';
  const SESSION_ID = params.get('SESSION_ID') || '';
  const q = new URLSearchParams({ PROLIFIC_PID, STUDY_ID, SESSION_ID, version: VERSION, ...payload });
  window.location.href = `${QUALTRICS_RETURN_URL}?${q.toString()}`;
}

/**************************************************************/
/* STIMULI */
const round1Questions = [
  { pair:1, prompt:"Question #1. Which of the following characters in an ancient script represents an animal?" },
  { pair:2, prompt:"Question #2. Which of the following characters in an ancient script represents a person?" },
  { pair:3, prompt:"Question #3. Which of the following characters in an ancient script represents a bird?" },
  { pair:4, prompt:"Question #4. Which of the following characters in an ancient script represents a rodent?" }
];
const imagePairs = [
  { A:"img/Pair 1 Image A.png", B:"img/Pair 1 Image B.png" },
  { A:"img/Pair 2 Image A.png", B:"img/Pair 2 Image B.png" },
  { A:"img/Pair 3 Image A.png", B:"img/Pair 3 Image B.png" },
  { A:"img/Pair 4 Image A.png", B:"img/Pair 4 Image B.png" }
];
const round1Choices = [null,null,null,null];

/**************************************************************/
/* IMAGE CHOICE HELPERS */
function imgChoice(src, altText) {
  return `<img class="choice-img" src="${src}" alt="${altText}">`;
}
const imageButtonHTML = '<button class="choice-btn" type="button">%choice%</button>';

/**************************************************************/
/* INTRO SCREENS */
const intro1 = {
  type: jsPsychHtmlKeyboardResponse,
  stimulus: `
  <div class="centered">
    <p>Welcome! Today you will answer some language questions about a researcher-manufactured ancient script.</p>
    <p>Whether you get the answers right or wrong in Round 1, try to learn. Round 2 will test how much you learned.</p>
    <p style="margin-top:24px; text-align:center;"><strong>Press the space bar to continue.</strong></p>
  </div>`,
  choices:[' '],
  data:{screen:'intro1'}
};

const intro2 = {
  type: jsPsychHtmlKeyboardResponse,
  stimulus: `
  <div class="centered">
    <p>People often assume they naturally learn from their mistakes, but research shows this process is more difficult and less automatic than it seems.</p>
    <p style="margin-top: 1.2em;">When something goes wrong, people frequently feel confident that they will remember what happened and why — yet those details are easy to misinterpret or forget.</p>
    <p style="margin-top: 1.2em;">As you complete the next task, keep in mind that learning from failure requires deliberate attention and that your memory for what happens may not be as reliable as it feels.</p>
    <p style="margin-top:24px; text-align:center;"><strong>Press the space bar to continue.</strong></p>
  </div>`,
  choices:[' '],
  data:{screen:'intro2'},
  on_finish: function(data){ data.reading_time = data.rt; }
};

/**************************************************************/
/* COMPREHENSION CHECK */
const comprehensionCheck = {
  type: jsPsychHtmlButtonResponse,
  stimulus: `
    <div class="centered">
      <div class="question-title">
        According to the message you just read, what is the main point about learning from mistakes?
      </div>
    </div>`,
  on_start:function(trial){
    const options = [
      { text:"People usually remember failures accurately without much effort.", value:"A" },
      { text:"Learning from mistakes requires deliberate attention because memory of what happened can be unreliable.", value:"B" },
      { text:"Most mistakes are caused by external factors rather than personal actions.", value:"C" },
      { text:"People naturally avoid repeating errors even if they don’t reflect on them.", value:"D" }
    ];
    trial.shuffled_options = jsPsych.randomization.shuffle(options);
    trial.choices = trial.shuffled_options.map(o=>o.text);
  },
  button_html:'<button class="jspsych-btn vertical-btn">%choice%</button>',
  data:{screen:'comprehension_check'},
  on_finish:function(data){
    const selected = this.shuffled_options[data.response];
    data.selected_option = selected.value;
    data.selected_text = selected.text;
    data.correct = (selected.value==="B") ? 1:0;
  }
};

/**************************************************************/
/* ROUND 1, BREAK, ROUND 2, FINAL (unchanged) */
/* ...Insert your full original Round 1, feedback, break, Round 2, final screens here... */

/**************************************************************/
/* BUILD TIMELINE */
const timeline = [];
timeline.push(preload, intro1, intro2, comprehensionCheck);

/* Original Round 1 loop */
for(let i=0;i<4;i++){ timeline.push(makeRound1Trial(i)); timeline.push(incorrectFeedback); }

/* Break + Round 2 */
timeline.push(breakScreen, round2Intro);
for(let i=0;i<4;i++){ timeline.push(makeRound2Trial(i)); }

/* Final screen */
timeline.push(finalScreen);

jsPsych.run(timeline);

</script>
</body>
</html>
