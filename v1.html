<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>LFF Task - Version 1</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<link rel="stylesheet" href="jspsych/jspsych.css" />
<script src="jspsych/jspsych.js"></script>
<script src="jspsych/plugin-preload.js"></script>
<script src="jspsych/plugin-html-keyboard-response.js"></script>
<script src="jspsych/plugin-html-button-response.js"></script>

<style>
body { background:#fafafa; font-family:Arial; }
.centered { max-width:900px; margin:auto; padding:24px; }
.question-title { font-size:22px; margin-bottom:16px; }
.vertical-btn {
  display:block;
  width:700px;
  max-width:90%;
  margin:10px auto;
  text-align:left;
  padding:12px;
}
</style>
</head>

<body>
<div id="jspsych-target"></div>

<script>

/**************** CONFIG ****************/
const VERSION = "v1";
const ROUND2_CORRECT_RULE = "same";
const BREAK_SECONDS = 120;
const QUALTRICS_RETURN_URL = "https://merceruniversity.co1.qualtrics.com/jfe/form/SV_eEG4o0S1x2n2DFI";

/**************** INIT ****************/
const jsPsych = initJsPsych({ display_element: 'jspsych-target' });
jsPsych.data.addProperties({ version: VERSION });

/**************** STIMULI ****************/
const round1Questions = [
 {pair:1,prompt:"Question #1. Which character represents an animal?"},
 {pair:2,prompt:"Question #2. Which character represents a person?"},
 {pair:3,prompt:"Question #3. Which character represents a bird?"},
 {pair:4,prompt:"Question #4. Which character represents a rodent?"}
];

const imagePairs = [
 {A:"img/Pair 1 Image A.png",B:"img/Pair 1 Image B.png"},
 {A:"img/Pair 2 Image A.png",B:"img/Pair 2 Image B.png"},
 {A:"img/Pair 3 Image A.png",B:"img/Pair 3 Image B.png"},
 {A:"img/Pair 4 Image A.png",B:"img/Pair 4 Image B.png"}
];

const round1Choices = [null,null,null,null];

/**************** HELPERS ****************/
function imgChoice(src){ return `<img src="${src}" width="300">`; }

/**************** INTRO ****************/
const intro1 = {
 type: jsPsychHtmlKeyboardResponse,
 stimulus: `<div class="centered">
 <p>Welcome! Press space.</p></div>`,
 choices:[' ']
};

const intro2 = {
 type: jsPsychHtmlKeyboardResponse,
 stimulus: `<div class="centered">
 <p>Learning from mistakes requires attention.</p>
 <p><b>Press space.</b></p></div>`,
 choices:[' '],
 on_finish: d=>d.reading_time=d.rt
};

/**************** COMPREHENSION ****************/
const comprehensionCheck = {
 type: jsPsychHtmlButtonResponse,
 stimulus:`<div class="centered"><div class="question-title">
 According to the message you just read, what is the main point about learning from mistakes?
 </div></div>`,

 on_start:function(trial){
  const opts=[
   {t:"People remember failures easily",v:"A"},
   {t:"Learning requires deliberate attention and memory is unreliable",v:"B"},
   {t:"Mistakes are external",v:"C"},
   {t:"People avoid repeating errors automatically",v:"D"}
  ];
  trial.opts=jsPsych.randomization.shuffle(opts);
  trial.choices=trial.opts.map(o=>o.t);
 },

 button_html:`<button class="vertical-btn">%choice%</button>`,

 on_finish:function(data){
  const sel=this.opts[data.response];
  data.selected_option=sel.v;
  data.correct=(sel.v==="B")?1:0;
 }
};

/**************** ROUND 1 ****************/
function makeRound1Trial(i){
 const pair=imagePairs[i];
 return {
  type: jsPsychHtmlButtonResponse,
  stimulus:`<div class="centered">${round1Questions[i].prompt}</div>`,
  choices:[imgChoice(pair.A),imgChoice(pair.B)],
  on_finish:function(d){
   const c=(d.response===0)?"A":"B";
   d.choice_label=c;
   round1Choices[i]=c;
  }
 };
}

/**************** ROUND 2 ****************/
function makeRound2Trial(i){
 const pair=imagePairs[i];
 return {
  type: jsPsychHtmlButtonResponse,
  stimulus:`<div class="centered">Round 2 Question ${i+1}</div>`,
  choices:[imgChoice(pair.A),imgChoice(pair.B)],
  on_finish:function(d){
   const c=(d.response===0)?"A":"B";
   d.correct=(c===round1Choices[i])?1:0;
  }
 };
}

/**************** FINAL ****************/
const finalScreen={
 type: jsPsychHtmlButtonResponse,
 stimulus:`<p>Done</p>`,
 choices:['Continue'],
 on_finish:()=>window.location.href=QUALTRICS_RETURN_URL
};

/**************** TIMELINE ****************/
const timeline=[];
timeline.push(intro1,intro2,comprehensionCheck);

for(let i=0;i<4;i++){ timeline.push(makeRound1Trial(i)); }
for(let i=0;i<4;i++){ timeline.push(makeRound2Trial(i)); }

timeline.push(finalScreen);

jsPsych.run(timeline);

</script>
</body>
</html>
