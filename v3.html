<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LFF Task - Version 1</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="stylesheet" href="jspsych/jspsych.css" />

  <script src="jspsych/jspsych.js"></script>
  <script src="jspsych/plugin-preload.js"></script>
  <script src="jspsych/plugin-html-keyboard-response.js"></script>
  <script src="jspsych/plugin-html-button-response.js"></script>

  <style>
    body { background:#fafafa; font-family: Arial, sans-serif; color:#111; }
    .centered { max-width:900px; margin:0 auto; padding:24px; line-height:1.45; }
    .question-title { font-size:22px; font-weight:600; margin-bottom:16px; }

    .image-choice-container {
      display:flex;
      justify-content:center;
      gap:40px;
      flex-wrap:wrap;
      margin-top:18px;
    }

    .choice-img {
      max-width:360px;
      max-height:320px;
      border:2px solid #ddd;
      border-radius:6px;
    }

    .vertical-btn {
      display:block;
      width:700px;
      max-width:90%;
      margin:10px auto;
      text-align:left;
      padding:12px;
    }

    .incorrect-banner {
      font-size:30px;
      font-weight:700;
      color:#b00020;
      text-align:center;
      margin:16px 0 24px;
    }

    .press-space { text-align:center; margin-top:24px; }

    .break-box {
      display:flex;
      gap:24px;
      align-items:flex-start;
      justify-content:space-between;
      flex-wrap:wrap;
      margin-top:10px;
    }

    textarea#music {
      width:100%;
      min-height:160px;
      font-size:16px;
      padding:12px;
      border:2px solid #ccc;
      border-radius:6px;
      resize:vertical;
    }

    .countdown {
      flex:0 0 220px;
      font-size:18px;
      border:2px solid #ccc;
      border-radius:6px;
      padding:12px;
      height:56px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#fff;
    }
  </style>
</head>

<body>
<div id="jspsych-target"></div>

<script>

/**************** CONFIG ****************/
const VERSION = "v1";
const ROUND2_CORRECT_RULE = "different";
const BREAK_SECONDS = 120;

const QUALTRICS_RETURN_URL = "https://merceruniversity.co1.qualtrics.com/jfe/form/SV_eEG4o0S1x2n2DFI";

/**************** INIT ****************/
const jsPsych = initJsPsych({ display_element: 'jspsych-target' });
jsPsych.data.addProperties({ version: VERSION });

/**************** PAYLOAD BUILDER ****************/
function buildSummaryPayload() {
  const all = jsPsych.data.get().values();

  const r1 = all.filter(d => d.round === 1);
  const r2 = all.filter(d => d.round === 2);

  const r1_choices = r1.map(d => d.choice_label || '').join(',');
  const r2_choices = r2.map(d => d.choice_label || '').join(',');

  const r2_correct_arr = r2.map(d => Number(d.correct || 0));
  const r2_correct = r2_correct_arr.join(',');
  const r2_total = r2_correct_arr.reduce((a, b) => a + b, 0);

  const rt_r1 = r1.map(d => d.rt || '').join(',');
  const rt_r2 = r2.map(d => d.rt || '').join(',');

  const breakRow = all.find(d => d.favorite_music !== undefined);
  const music = breakRow ? breakRow.favorite_music : "";
  const music_short = music.length > 150 ? music.slice(0, 150) : music;

  const readingRow = all.find(d => d.reading_time !== undefined);
  const reading_time = readingRow ? readingRow.reading_time : '';

  const compRow = all.find(d => d.screen === 'comprehension');
  const comp_correct = compRow ? compRow.correct : '';

  return {
    r1_choices,
    r2_choices,
    r2_correct,
    r2_total: String(r2_total),
    rt_r1,
    rt_r2,
    music_short,
    reading_time,
    comp_correct
  };
}

/**************** SEND DATA ****************/
function sendDataToQualtrics() {
  const payload = buildSummaryPayload();

  const params = new URLSearchParams(window.location.search);
  const PROLIFIC_PID = params.get('PROLIFIC_PID') || '';
  const STUDY_ID = params.get('STUDY_ID') || '';
  const SESSION_ID = params.get('SESSION_ID') || '';

  const q = new URLSearchParams({
    PROLIFIC_PID,
    STUDY_ID,
    SESSION_ID,
    version: VERSION,
    ...payload
  });

  window.location.href = `${QUALTRICS_RETURN_URL}?${q.toString()}`;
}

/**************** DATA ****************/
const round1Questions = [
  { pair:1, prompt:"Question #1. Which of the following characters in an ancient script represents an animal?" },
  { pair:2, prompt:"Question #2. Which of the following characters in an ancient script represents a person?" },
  { pair:3, prompt:"Question #3. Which of the following characters in an ancient script represents a bird?" },
  { pair:4, prompt:"Question #4. Which of the following characters in an ancient script represents a rodent?" }
];

const round2Questions = [
  "Question #1. Which of the following characters represents a non-living stationary object?",
  "Question #2. Which of the following characters represents a non-living stationary object?",
  "Question #3. Which of the following characters represents a non-living stationary object?",
  "Question #4. Which of the following characters represents a non-living stationary object?"
];

const imagePairs = [
  { A:"img/Pair 1 Image A.png", B:"img/Pair 1 Image B.png" },
  { A:"img/Pair 2 Image A.png", B:"img/Pair 2 Image B.png" },
  { A:"img/Pair 3 Image A.png", B:"img/Pair 3 Image B.png" },
  { A:"img/Pair 4 Image A.png", B:"img/Pair 4 Image B.png" }
];

const round1Choices = [null,null,null,null];

/**************** HELPERS ****************/
function imgChoice(src, alt) {
  return `<img class="choice-img" src="${src}" alt="${alt}">`;
}

/**************** INTRO ****************/
const intro1 = {
  type: jsPsychHtmlKeyboardResponse,
  stimulus: `<div class="centered">
    <p>Welcome! Today you will answer some language questions about a researcher-manufactured ancient script.</p>
    <p>Whether you get the answers right or wrong in Round 1, try to learn. Round 2 will test how much you learned.</p>
    <p style="text-align:center;"><strong>Press space to continue.</strong></p>
  </div>`,
  choices: [' ']
};

const intro2 = {
  type: jsPsychHtmlKeyboardResponse,
  stimulus: `<div class="centered">
    <p>People often assume they naturally learn from their mistakes...</p>
    <p>When something goes wrong, people frequently feel confident...</p>
    <p>As you complete the next task...</p>
    <p style="text-align:center;"><strong>Press space to begin Round 1.</strong></p>
  </div>`,
  choices: [' '],
  on_finish: d => d.reading_time = d.rt
};

/**************** BREAK ****************/
let breakIntervalId=null;

const breakScreen = {
  type: jsPsychHtmlButtonResponse,
  stimulus: `
  <div class="centered">
    <p>Thanks for answering those initial questions. Right now, take a short breather.</p>
    <p><strong>Tell us: what is your favorite music to listen to?</strong></p>
    <p>Please take two minutes and write your answer in the textbox below.</p>

    <div class="break-box">
      <div style="flex:1;">
        <textarea id="music" placeholder="Type your answer here..."></textarea>
      </div>
      <div class="countdown" id="countdown">2:00</div>
    </div>
  </div>
  `,
  choices: ['Submit'],
  button_html: '<button class="jspsych-btn" type="button" disabled>%choice%</button>',

  on_load: function(){

    const btn = document.querySelector('button'); /* ✅ FIXED */
    const el = document.getElementById('countdown');

    let total = BREAK_SECONDS;

    function formatTime(s){
      return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
    }

    el.textContent = formatTime(total);

    breakIntervalId = setInterval(()=>{
      total--;
      el.textContent = formatTime(Math.max(total,0));

      if(total <= 0){
        clearInterval(breakIntervalId);
        btn.disabled = false;
      }

    },1000);
  },

  on_finish: function(d){
    if (breakIntervalId !== null){
      clearInterval(breakIntervalId);
      breakIntervalId = null;
    }

    const txt = document.getElementById('music');
    d.favorite_music = txt ? txt.value : '';
  }
};

/**************** FINAL ****************/
const finalScreen = {
  type: jsPsychHtmlButtonResponse,
  stimulus: `<div class="centered" style="text-align:center;">
    <p><strong>Thank you for your participation!</strong></p>
    <p>Click continue to return to Prolific.</p>
  </div>`,
  choices: ['Continue'],
  on_finish: function(){
    sendDataToQualtrics();
  }
};

/**************** TIMELINE ****************/
const timeline = [];

timeline.push(intro1, intro2);
timeline.push(breakScreen);
timeline.push(finalScreen);

jsPsych.run(timeline);

</script>
</body>
</html>
